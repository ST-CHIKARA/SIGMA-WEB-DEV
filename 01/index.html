<!-- A website works when 3 things work in combination with each other --> 

<!-- 1. Client :- A user like me -->
<!-- 2. Browser :- uses a browser like chrome to request a website from the server -->
<!-- 3. Server :- Server stores the data and all code related to the website and when the client sends the request through a browser it sends back the data in form of packets and browser then reads the data and parses it in form of the website the client visually sees -->

<!-- At each click or interaction on the website by the client the browser keeps sending additional requests to the server to fulfill the requests the client is trying to do. -->


<!-- Frontend :- Is what you see when you open a website and interact with it -->

<!-- Backend :- Is the server side of the website that remains hidden from the user. Its primary role is to store, organize, and process data, ensuring that everything on the client-side functions correctly. When a user interacts with the frontend—like logging in or searching for a product, the backend handles the logic, communicates with the database, and sends the necessary information back to keep the experience seamless. -->
